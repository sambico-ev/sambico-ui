<div class="toolbar-container" [class.mobile]="isMobile | async">
  <div class="toolbar">
    <img
      class="logo"
      [class.mobile]="isMobile | async"
      src="assets/logo/logo-full-horizontal.png"
      alt="sambico-logo"
    />
    <div class="toolbar-actions">
      <app-burger-button (opened)="toggleMenu($event)"></app-burger-button>
    </div>
  </div>
  <div class="menu-wrapper" [class.menu-open]="menuOpen">
    <app-toolbar-menu></app-toolbar-menu>
  </div>
</div>
